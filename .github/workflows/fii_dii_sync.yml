name: FII/DII Data Sync

on:
  schedule:
    # Run at 13:30 UTC (7:00 PM IST) and 14:30 UTC (8:00 PM IST) Monday-Friday
    - cron: '30 13,14 * * 1-5'
  workflow_dispatch: # Allow manual triggering from the GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci || npm install

      - name: Run FII/DII Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node backend/scraper/sync.js
